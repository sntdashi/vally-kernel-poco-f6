name: Poco F6 HyperKernel

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install packages
      run: |
        sudo apt install -y \
        bc bison build-essential flex git \
        libssl-dev libelf-dev curl zip dos2unix \
        clang lld llvm

    - name: Fix script format
      run: |
        dos2unix scripts/build.sh

    - name: Run build
      run: |
        chmod +x scripts/build.sh
        bash scripts/build.sh

    - name: Upload kernel
      uses: actions/upload-artifact@v4
      with:  
       name: PocoF6-HyperKernel
       path: PocoF6-HyperKernel.zip
    
